name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # 每天星期一到星期五下午 07:00 UTC (等於台灣時間下午 15:00)
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # 支援手動觸發，方便測試！

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Static Stock Data
        run: npm run build:data

      - name: Build React App
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
