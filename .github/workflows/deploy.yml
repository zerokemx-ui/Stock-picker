name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # Taiwan market data is published after close; retry several times in case
    # TWSE or TDCC data is delayed.
    - cron: '20 6 * * 1-5'  # 14:20 Asia/Taipei
    - cron: '40 7 * * 1-5'  # 15:40 Asia/Taipei
    - cron: '10 8 * * 1-5'  # 16:10 Asia/Taipei
    - cron: '10 9 * * 1-5'  # 17:10 Asia/Taipei
    - cron: '10 12 * * 1-5' # 20:10 Asia/Taipei
    - cron: '30 15 * * 1-5' # 23:30 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

      - name: Validate Generated Stock Data
        run: |
          node -e "
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('public/api/stocks.json', 'utf8'));
          if (!payload.success) throw new Error('stocks.json success=false');
          if (payload.isFallback) throw new Error('stocks.json was generated from fallback data');
          if (!payload.dataDate) throw new Error('stocks.json missing dataDate');
          if (!Array.isArray(payload.data) || payload.data.length < 1000) {
            throw new Error('stocks.json has too few rows: ' + (payload.data && payload.data.length));
          }
          console.log(JSON.stringify({
            source: payload.source,
            dataDate: payload.dataDate,
            generatedAt: payload.generatedAt,
            count: payload.data.length
          }, null, 2));
          "

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
